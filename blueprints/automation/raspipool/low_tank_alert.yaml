blueprint:
  name: Raspipool low tank alert
  description: >
    Send a mobile notification when any Raspipool chemical tank drops below
    a configurable threshold. Replaces the legacy `notify_muriatic_tank` /
    `notify_bleach_tank` automations.
  domain: automation
  source_url: https://github.com/ArrowTech-Labs/raspipool
  input:
    bleach_tank_sensor:
      name: Bleach tank sensor
      default: sensor.bleach_tank
      selector:
        entity:
          domain: sensor
    muriatic_tank_sensor:
      name: Muriatic tank sensor
      default: sensor.muriatic_tank
      selector:
        entity:
          domain: sensor
    threshold_liters:
      name: Alert threshold (liters)
      default: 2
      selector:
        number:
          min: 0
          max: 20
          step: 0.5
    notify_service:
      name: Notification service
      description: e.g. notify.mobile_app_my_phone
      default: notify.notify
      selector:
        text:

trigger:
  - platform: numeric_state
    entity_id: !input bleach_tank_sensor
    below: !input threshold_liters
    id: bleach
  - platform: numeric_state
    entity_id: !input muriatic_tank_sensor
    below: !input threshold_liters
    id: muriatic

action:
  - service: !input notify_service
    data:
      title: "Pool alert: low chemical tank"
      message: >-
        {% if trigger.id == 'bleach' %}
          Bleach tank is below threshold ({{ states(trigger.entity_id) }} L remaining).
        {% else %}
          Muriatic acid tank is below threshold ({{ states(trigger.entity_id) }} L remaining).
        {% endif %}

mode: single
