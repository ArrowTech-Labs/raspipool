name: Raspipool Installer
version: "1.0.1"
slug: raspipool_installer
description: One-click installer and updater for the Raspipool custom integration, blueprints, and ESPHome template.
url: https://github.com/ArrowTech-Labs/raspipool
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
startup: application
boot: manual
stage: experimental
map:
  - config:rw
  - share:rw
hassio_api: true
hassio_role: manager
ingress: true
ingress_port: 8099
panel_icon: mdi:pool
panel_title: Raspipool
panel_admin: true
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Raspipool installer Ingress UI (internal only)
options:
  log_level: info
  auto_sync_on_start: true
  overwrite_blueprints: false
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  auto_sync_on_start: bool
  overwrite_blueprints: bool
